version: "3.9"

services:

  client:
    image: node:20
    working_dir: /app
    volumes:
      - ./client:/app
    ports:
      - "4200:4200"
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --poll 2000"

  server:
    image: mcr.microsoft.com/dotnet/sdk:7.0
    working_dir: /app
    volumes:
      - ./server:/app
    ports:
      - "5000:5000"
    command: sh -c "dotnet restore && dotnet watch run --urls=http://0.0.0.0:5000"