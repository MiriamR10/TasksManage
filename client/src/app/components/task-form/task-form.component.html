<div class="container mt-5" dir="rtl">
  <div class="card shadow-sm">
    <div class="card-header bg-white border-bottom">
      <h4 class="mb-0 text-primary text-center">{{ title }}</h4>
    </div>
    <div class="card-body">
      <form [formGroup]="taskForm" (ngSubmit)="onSubmit()" *ngIf="!isLoading" class="text-center">
        <div class="mb-3">
          <label for="title" class="form-label text-primary">כותרת המשימה *</label>
          <input type="text" class="form-control" id="title" formControlName="title" required>
          <small class="text-danger" *ngIf="taskForm.get('title')?.invalid && taskForm.get('title')?.touched">
            זה שדה חובה
          </small>
        </div>

        <div class="mb-3">
          <label for="description" class="form-label text-primary">תיאור המשימה</label>
          <textarea class="form-control" id="description" formControlName="description" rows="4"></textarea>
        </div>

        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label for="priority" class="form-label text-primary">עדיפות</label>
              <select class="form-select" id="priority" formControlName="priority">
                <option *ngFor="let p of priorities" [value]="p">{{ p }}</option>
              </select>
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label for="status" class="form-label text-primary">סטטוס</label>
              <select class="form-select" id="status" formControlName="status">
                <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
              </select>
            </div>
          </div>
        </div>

        <div class="mb-3">
          <label for="dueDate" class="form-label text-primary">תאריך הסיום *</label>
          <input type="date" class="form-control" id="dueDate" formControlName="dueDate" required>
          <small class="text-danger" *ngIf="taskForm.get('dueDate')?.invalid && taskForm.get('dueDate')?.touched">
            זה שדה חובה
          </small>
        </div>

        <div class="d-flex gap-2 justify-content-center">
          <button type="submit" class="btn btn-primary">
            {{ buttonText }}
          </button>
          <a routerLink="/" class="btn btn-secondary">
            ביטול
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
