<div class="container mt-5" dir="rtl" style="text-align: right;">
  <h1 class="mb-4">מנהל משימות</h1>

  <div class="row">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h5>{{ isEditing() ? 'עריכת משימה' : 'הוספת משימה חדשה' }}</h5>
        </div>
        <div class="card-body">
          <form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label for="title" class="form-label">כותרת המשימה *</label>
              <input type="text" class="form-control" id="title" formControlName="title" required>
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">תיאור המשימה</label>
              <textarea class="form-control" id="description" formControlName="description" rows="3"></textarea>
            </div>

            <div class="mb-3">
              <label for="priority" class="form-label">עדיפות</label>
              <select class="form-select" id="priority" formControlName="priority">
                <option *ngFor="let p of priorities" [value]="p">{{ p }}</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="dueDate" class="form-label">תאריך הסיום *</label>
              <input type="date" class="form-control" id="dueDate" formControlName="dueDate" required>
            </div>

            <div class="mb-3">
              <label for="status" class="form-label">סטטוס</label>
              <select class="form-select" id="status" formControlName="status">
                <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
              </select>
            </div>

            <button type="submit" class="btn btn-primary" [disabled]="!taskForm.valid">
              {{ isEditing() ? 'עדכון' : 'הוספה' }}
            </button>
            <button type="button" class="btn btn-secondary ms-2" (click)="resetForm()" *ngIf="isEditing()">ביטול</button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h5>רשימת משימות</h5>
        </div>
        <div class="card-body">
          <div class="list-group">
            <div *ngFor="let task of tasks()" class="list-group-item d-flex justify-content-between align-items-center">
              <div>
                <h6 class="mb-1">{{ task.title }}</h6>
                <p class="mb-1">{{ task.description }}</p>
                <small>עדיפות: {{ task.priority }} | סטטוס: {{ task.status }} | תאריך: {{ task.dueDate }}</small>
              </div>
              <div>
                <button class="btn btn-sm me-2" (click)="editTask(task)">
                  <i class="bi bi-pencil"></i> עריכה
                </button>
                <button class="btn btn-sm" (click)="deleteTask(task.id!)">
                  <i class="bi bi-trash"></i> מחיקה
                </button>
              </div>
            </div>
          </div>
          <p *ngIf="tasks().length === 0" class="text-muted mt-3">אין משימות ממתינות.</p>
        </div>
      </div>
    </div>
  </div>
</div>
